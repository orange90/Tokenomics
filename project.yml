name: Tokenomics
options:
  bundleIdPrefix: com.tokenomics
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_STRICT_CONCURRENCY: minimal
targets:
  Tokenomics:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tokenomics
    resources:
      - path: Tokenomics/Resources
    info:
      path: Tokenomics/Info.plist
      properties:
        CFBundleDisplayName: Tokenomics
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSApplicationCategoryType: public.app-category.developer-tools
        NSHumanReadableCopyright: "Copyright © 2026 Tokenomics."
    entitlements:
      path: Tokenomics/Tokenomics.entitlements
      properties:
        # App Sandbox 必须保持关闭：沙盒应用读不到 Claude CLI 写在 login keychain
        # 里的 "Claude Code-credentials"（也访问不了 ~/.claude）。CodexBar 同样不开沙盒。
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        # 不要 keychain-access-groups：它只用于在“自己的”多个 app 间共享钥匙串，
        # 读取 Claude 的条目根本用不上；带上它反而要求开发者证书签名，徒增运行门槛。
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tokenomics.Tokenomics
        # 必须用稳定签名身份（而非 ad-hoc / CODE_SIGNING_ALLOWED=NO）：
        # macOS 钥匙串的“始终允许”是按代码签名身份记忆的，ad-hoc 二进制没有
        # 稳定身份（cdhash 每次 build 都变），授权挂不住 → 每次读 Claude 凭证都重弹。
        # 用免费的 Apple Development 证书签名后，一次“始终允许”即可永久生效。
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: "JR39NPKJK6"
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
