name: Tokenomics
options:
  bundleIdPrefix: com.tokenomics
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_STRICT_CONCURRENCY: minimal
targets:
  Tokenomics:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tokenomics
    resources:
      - path: Tokenomics/Resources
    info:
      path: Tokenomics/Info.plist
      properties:
        CFBundleDisplayName: Tokenomics
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSApplicationCategoryType: public.app-category.developer-tools
        NSHumanReadableCopyright: "Copyright © 2026 Tokenomics."
    entitlements:
      path: Tokenomics/Tokenomics.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.tokenomics.Tokenomics
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tokenomics.Tokenomics
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
